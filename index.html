<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="theme-switch-wrapper">
            <button id="theme-toggle">Dark Mode</button>
        </div>
        <h1 id="main-title">Lotto Number Generator</h1>
        
        <div class="mode-selection">
            <button id="lotto-mode-btn" class="mode-btn active">Lotto 6/45</button>
            <button id="pension-mode-btn" class="mode-btn">Pension 720+</button>
        </div>

        <div id="numbers-container" class="numbers-display"></div>
        <button id="generate-btn">Generate Numbers</button>
    </div>
    <script src="main.js"></script>
</body>
</html>
